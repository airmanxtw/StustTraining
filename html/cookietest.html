<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            line-height: 1.6;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin-top: 0;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        #logoutBtn {
            background: #dc2626;
        }

        #refreshBtn {
            background: #d97706;
        }

        button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 6px;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }

        .status.info {
            display: block;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        .status.success {
            display: block;
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .status.error {
            display: block;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cookie Test</h1>
        <p>點擊按鈕後，會將以下資料 POST 到 <code>https://localhost:7194/</code>：</p>
        <p><code>{ userid: 'test', password: '12345' }</code></p>

        <div class="button-group">
            <button id="sendBtn" type="button">送出登入請求</button>
            <button id="refreshBtn" type="button">刷token</button>
            <button id="logoutBtn" type="button">登出</button>
        </div>

        <div id="result" class="status"></div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const result = document.getElementById('result');
        let authToken = '';

        function showMessage(type, message) {
            result.className = 'status ' + type;
            result.textContent = message;
        }

        sendBtn.addEventListener('click', async function () {
            const requestBody = {
                userid: 'test',
                password: '12345'
            };

            sendBtn.disabled = true;
            showMessage('info', '請求中...');

            try {
                const response = await fetch('https://localhost:7194/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const text = await response.text();

                if (response.status === 200) {
                    let token = text.trim();

                    try {                        
                        const json = JSON.parse(text);
                        token = json;
                    } catch {
                        // Keep plain text token when response body is not JSON.
                    }

                    authToken = token;
                    debugger;
                    //logoutBtn.disabled = !authToken;
                    showMessage('success', '成功取得 token：\n' + text);
                } else if (response.status === 401) {
                    authToken = '';
                    //logoutBtn.disabled = true;
                    showMessage('error', '登入失敗：\n' + text);
                } else {
                    authToken = '';
                    //logoutBtn.disabled = true;
                    showMessage('error', '發生未預期的錯誤。\n狀態碼：' + response.status + '\n訊息：' + text);
                }
            } catch (error) {
                authToken = '';
                //logoutBtn.disabled = true;
                showMessage('error', '無法連線到伺服器：\n' + error.message);
            } finally {
                sendBtn.disabled = false;
            }
        });

        refreshBtn.addEventListener('click', async function () {
            if (!authToken) {
                showMessage('error', '目前沒有可用的 token，請先登入。');
                return;
            }

            showMessage('info', '刷 token 請求中...');

            try {
                const response = await fetch('https://localhost:7194/refreshtoken', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        Authorization: 'Bearer ' + authToken
                    }
                });

                const text = await response.text();

                if (response.ok) {
                    let token = text.trim();

                    try {
                        const json = JSON.parse(text);
                        token = json;
                    } catch {
                        // Keep plain text token when response body is not JSON.
                    }

                    authToken = token;
                    showMessage('success', '刷 token 成功，已取得新 token：\n' + text);
                } else {
                    showMessage('error', '刷 token 失敗。\n狀態碼：' + response.status + '\n訊息：' + text);
                }
            } catch (error) {
                showMessage('error', '無法連線到伺服器：\n' + error.message);
            }
        });

        logoutBtn.addEventListener('click', async function () {
            if (!authToken) {
                showMessage('error', '目前沒有可用的 token，請先登入。');
                return;
            }
            
            showMessage('info', '登出請求中...');

            try {
                debugger;
                const response = await fetch('https://localhost:7194/logout', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        Authorization: 'Bearer ' + authToken
                    }
                });

                const text = await response.text();
                debugger;
                if (response.ok) {
                    authToken = '';
                    showMessage('success', '登出成功：\n' + text);
                } else {
                    showMessage('error', '登出失敗。\n狀態碼：' + response.status + '\n訊息：' + text);
                }
            } catch (error) {
                showMessage('error', '無法連線到伺服器：\n' + error.message);
            } finally {
                //logoutBtn.disabled = !authToken;
            }
        });
    </script>
</body>
</html>
